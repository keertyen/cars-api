version: "3.8"

services:
  # Firestore emulator — the Go client connects when FIRESTORE_EMULATOR_HOST is set.
  firestore:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: >
      gcloud emulators firestore start
        --project=cars-api-local
        --host-port=0.0.0.0:8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The API service (optional — you can also run `make run` directly)
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      FIRESTORE_EMULATOR_HOST: firestore:8081
      GCP_PROJECT_ID: cars-api-local
      PORT: "8080"
      RATE_LIMIT_RPS: "10"
      RATE_LIMIT_BURST: "20"
      CACHE_TTL_SECONDS: "300"
    depends_on:
      firestore:
        condition: service_healthy
    restart: on-failure
